services:
  postgres:
    image: pgvector/pgvector:pg16        # Postgres 16 con pgvector ya incluido
    container_name: legaltech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: legaltech
      POSTGRES_PASSWORD: legaltech
      POSTGRES_DB: legaltech
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legaltech"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: legaltech-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    container_name: legaltech-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"     # API S3
      - "9001:9001"     # Consola web (http://localhost:9001)
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Crea el bucket "contracts" automaticamente al levantar
  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'esperando minio...' && sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/contracts;
      /usr/bin/mc anonymous set none local/contracts;
      exit 0;
      "

  # Tunel Cloudflare: expone el backend (que corre en el HOST con `npm run dev`,
  # puerto 3000) en una URL publica para que un companero acceda sin estar en tu
  # red. Solo lo corre QUIEN tiene el backend; el companero solo cambia
  # VITE_API_URL en el frontend. Por eso apuntamos a host.docker.internal.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: legaltech-tunnel
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"   # el contenedor alcanza el host (Linux)
    # OPCION A (rapida, sin cuenta): URL aleatoria *.trycloudflare.com que CAMBIA
    # en cada reinicio. Para verla:  docker compose logs -f cloudflared
    command: tunnel --no-autoupdate --url http://host.docker.internal:3000
    # OPCION B (estable, URL fija): requiere cuenta Cloudflare + dominio. Crea el
    # tunel en el dashboard Zero Trust, define TUNNEL_TOKEN en backend/.env, y
    # reemplaza el `command` de arriba por la siguiente linea:
    # command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}

volumes:
  pgdata:
  redisdata:
  miniodata:
